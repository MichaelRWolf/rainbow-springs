repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=102400"] # 100MB

  - repo: local
    hooks:
      - id: markdown-table-formatter
        name: markdown-table-formatter (align columns)
        entry: npx markdown-table-formatter
        language: system
        types: [markdown]

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint-fix
        # companion: .markdownlint.json must include "MD060": false

  - repo: https://github.com/sirosen/texthooks
    rev: 0.7.1
    hooks:
      - id: fix-ligatures
        types: [markdown]
      - id: fix-smartquotes
        types: [markdown]
      - id: fix-unicode-dashes
        types: [markdown]
